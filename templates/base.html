<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gotham{% block title %}{% endblock %}</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     #0a0a0a;
      --border: rgba(255,255,255,0.08);
      --text:   #ffffff;
      --muted:  rgba(255,255,255,0.4);
    }

    html {
      zoom: 1.33;
    }
    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
    }

    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 44px;
      background: rgba(10,10,10,0.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 28px;
      z-index: 100;
    }

    .nav-logo {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text);
      text-decoration: none;
    }

    .nav-spacer { flex: 1; }

    .nav-link {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      padding: 6px 14px;
      border: 1px solid transparent;
      transition: color 0.15s, border-color 0.15s;
    }
    .nav-link:hover { color: var(--text); border-color: var(--border); }

    .nav-btn {
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--bg);
      background: var(--text);
      border: none;
      padding: 7px 20px;
      cursor: pointer;
      text-decoration: none;
      transition: opacity 0.15s;
    }
    .nav-btn:hover { opacity: 0.85; }
  </style>
</head>
<body>

  <nav>
    <a href="/" class="nav-logo">Gotham</a>
    <div class="nav-spacer"></div>
    {% if session.user %}
      <a href="/cameras" class="nav-link">Cameras</a>
      <a href="/logout" class="nav-link">Sign Out</a>
    {% else %}
      <a href="/login" class="nav-link">Sign In</a>
      <a href="/register" class="nav-btn">Register</a>
    {% endif %}
  </nav>

  {% block content %}{% endblock %}

</body>
</html>
