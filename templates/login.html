{% extends "base.html" %}
{% block title %} · Sign In{% endblock %}

{% block content %}
<style>
  .auth-wrap {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 44px 16px 0;
  }

  .auth-card {
    width: 360px;
    border: 1px solid rgba(255,255,255,0.08);
    padding: 40px 36px;
    background: #0d0d0d;
  }

  .auth-logo {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.4);
    margin-bottom: 28px;
  }

  .auth-title {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.01em;
    margin-bottom: 4px;
  }

  .auth-sub {
    font-size: 11px;
    color: rgba(255,255,255,0.4);
    letter-spacing: 0.03em;
    margin-bottom: 32px;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 16px;
  }

  .field label {
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.4);
  }

  .field input {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.08);
    outline: none;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    color: #fff;
    padding: 10px 12px;
    width: 100%;
    transition: border-color 0.15s;
  }
  .field input:focus { border-color: rgba(255,255,255,0.28); }

  .auth-btn {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #0a0a0a;
    background: #fff;
    border: none;
    padding: 12px;
    width: 100%;
    cursor: pointer;
    margin-top: 8px;
    transition: opacity 0.15s;
  }
  .auth-btn:hover { opacity: 0.85; }

  .auth-footer {
    margin-top: 20px;
    font-size: 11px;
    color: rgba(255,255,255,0.35);
    letter-spacing: 0.04em;
  }
  .auth-footer a {
    color: rgba(255,255,255,0.7);
    text-decoration: none;
  }
  .auth-footer a:hover { color: #fff; }

  .flash {
    font-size: 11px;
    letter-spacing: 0.06em;
    color: #ff5555;
    margin-bottom: 16px;
    padding: 10px 12px;
    border: 1px solid rgba(255,80,80,0.2);
    background: rgba(255,80,80,0.05);
  }
</style>

<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">Gotham</div>
    <div class="auth-title">Sign In</div>
    <div class="auth-sub">Authorized personnel only.</div>

    {% with msgs = get_flashed_messages() %}
      {% if msgs %}
        <div class="flash">{{ msgs[0] }}</div>
      {% endif %}
    {% endwith %}

    <form method="POST">
      <div class="field">
        <label>Username</label>
        <input type="text" name="username" autocomplete="username" required />
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" name="password" autocomplete="current-password" required />
      </div>
      <button type="submit" class="auth-btn">Authenticate</button>
    </form>

    <div class="auth-footer">
      No account? <a href="/register">Register</a>
    </div>
  </div>
</div>
{% endblock %}
